<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot Dash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 12px;
      color: #6b7280;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .no-match {
      padding: 40px 20px;
      text-align: center;
      color: #9ca3af;
    }
    .no-match h2 { font-size: 16px; margin-bottom: 8px; color: #6b7280; }
    .no-match p { font-size: 13px; }
    .run-list {
      padding: 12px;
    }
    .run-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .run-item:hover { border-color: #93c5fd; }
    .run-name {
      font-family: monospace;
      font-size: 13px;
      font-weight: 600;
    }
    .run-meta {
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }
    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 500;
    }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-failure { background: #fee2e2; color: #991b1b; }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span>Checking for matching runs...</span>
    </div>
  </div>

  <script src="dist/sidepanel.js"></script>
</body>
</html>
